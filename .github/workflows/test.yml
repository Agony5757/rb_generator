name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DATA_VERSION: "0.0.5"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build libomp-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest

      - name: Download test data files
        run: |
          curl -sL -o rb22.dat "https://github.com/Agony5757/rb_generator/releases/download/${DATA_VERSION}/rb22.dat"
          curl -sL -o rb44.dat "https://github.com/Agony5757/rb_generator/releases/download/${DATA_VERSION}/rb44.dat"

      - name: Build and install
        run: pip install -v .

      - name: Run tests
        run: pytest test/test.py -v
